name: AI Intelligence Briefing

on:
  workflow_dispatch:   # Run manually from GitHub Actions tab

permissions:
  contents: write      # Required to commit seen_ids.json back to repo

jobs:
  # ── Daily digest (cron) ───────────────────────────────────────────────────
  run-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AI Intelligence Bot
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          HF_TOKEN:            ${{ secrets.HF_TOKEN }}
        run: python daily_briefing.py

      - name: Commit seen_ids + keywords update
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_ids.json user_keywords.json || true
          git diff --cached --quiet || git commit -m "bot: update seen_ids + keywords [skip ci]"
          git push